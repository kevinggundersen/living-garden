<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Living Garden</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    min-height: 100%;
    background: #0a1628;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #e8e4d8;
  }
  body { overflow-x: hidden; overflow-y: auto; }
  canvas { display: block; cursor: default; }
  canvas.hover { cursor: pointer; }

  .controls {
    position: fixed;
    top: 20px;
    left: 20px;
    display: flex;
    gap: 8px;
    align-items: center;
    background: rgba(10, 20, 35, 0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    padding: 10px 14px;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    font-size: 13px;
    z-index: 10;
  }
  .controls input {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #e8e4d8;
    padding: 6px 10px;
    border-radius: 8px;
    outline: none;
    font: inherit;
    width: 160px;
  }
  .controls input:focus { border-color: rgba(255, 255, 255, 0.3); }
  .controls button {
    background: #c9a876;
    color: #0a1628;
    border: none;
    padding: 7px 14px;
    border-radius: 8px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
  }
  .controls button:hover { background: #d9b886; }
  .controls .icon-btn {
    background: rgba(255, 255, 255, 0.06);
    color: #e8e4d8;
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 6px 10px;
    border-radius: 8px;
    font: inherit;
    cursor: pointer;
    line-height: 1;
  }
  .controls .icon-btn:hover { background: rgba(255, 255, 255, 0.12); }
  .controls .icon-btn.active {
    background: rgba(201, 168, 118, 0.22);
    border-color: rgba(201, 168, 118, 0.45);
  }
  .controls .status { font-size: 11px; opacity: 0.6; margin-left: 4px; }

  .info {
    position: fixed;
    left: 0;
    top: 0;
    width: 300px;
    background: rgba(10, 20, 35, 0.78);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    padding: 18px 20px;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    z-index: 10;
    opacity: 0;
    transform: translateY(-6px);
    transition: opacity 0.22s ease, transform 0.22s ease, left 0.28s ease, top 0.28s ease;
    pointer-events: none;
  }
  .info.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .info h3 { font-size: 18px; margin-bottom: 6px; color: #f0ead8; font-weight: 600; }
  .info .lang {
    font-size: 11px;
    opacity: 0.75;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .info .lang .dot { width: 9px; height: 9px; border-radius: 50%; }
  .info p {
    font-size: 13px;
    line-height: 1.55;
    opacity: 0.85;
    margin-bottom: 14px;
  }
  .info .stats {
    display: flex;
    gap: 14px;
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 14px;
  }
  .info a {
    display: inline-block;
    color: #c9a876;
    text-decoration: none;
    border-bottom: 1px solid rgba(201, 168, 118, 0.35);
    font-size: 13px;
    padding-bottom: 1px;
  }
  .info a:hover { border-bottom-color: #c9a876; }

  .hint {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    opacity: 0.45;
    pointer-events: none;
    letter-spacing: 0.3px;
  }

  .identity {
    position: fixed;
    bottom: 22px;
    left: 22px;
    font-size: 12px;
    opacity: 0.5;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .identity strong { color: #c9a876; font-weight: 600; letter-spacing: 0.5px; text-transform: none; }
</style>
</head>
<body>
  <canvas id="garden"></canvas>

  <div class="controls">
    <span>🌱</span>
    <input id="username" placeholder="your github handle" />
    <button id="grow">Grow</button>
    <button id="sound" class="icon-btn" title="Enable ambient sound" aria-label="Toggle ambient sound">🔇</button>
    <span class="status" id="status">showing demo garden</span>
  </div>

  <div class="info" id="info">
    <h3 id="i-name"></h3>
    <div class="lang"><span class="dot" id="i-dot"></span><span id="i-lang"></span></div>
    <p id="i-desc"></p>
    <div class="stats" id="i-stats"></div>
    <a id="i-link" href="" target="_blank" rel="noopener">Visit repo →</a>
  </div>

  <div class="hint">hover a plant · click to open · each repo grows with its activity</div>
  <div class="identity">a garden by <strong>you</strong></div>

<script>
"use strict";

// ============================================================
// LIVING GARDEN
// Each repo becomes a plant. Code size -> height. Language -> color.
// Stars -> orbiting fireflies. Recent pushes -> blooming glow.
// Day/night tracks the viewer's local clock.
// ============================================================

// ---------- language palette (GitHub-ish) ----------
const LANG_COLORS = {
  JavaScript: "#f1e05a",
  TypeScript: "#3178c6",
  Python: "#3572A5",
  Rust: "#dea584",
  Go: "#00ADD8",
  HTML: "#e34c26",
  CSS: "#563d7c",
  Ruby: "#701516",
  Java: "#b07219",
  "C++": "#f34b7d",
  C: "#bbbbbb",
  Swift: "#FA7343",
  Kotlin: "#A97BFF",
  Shell: "#89e051",
  Vue: "#41b883",
  Svelte: "#ff3e00",
  Haskell: "#5e5086",
  Elixir: "#6e4a7e",
  Lua: "#000080",
  PHP: "#4F5D95",
  "C#": "#178600",
  Dart: "#00B4AB",
  Zig: "#ec915c",
};

// ---------- helpers ----------
function hashStr(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}
function mulberry32(seed) {
  return function () {
    let t = (seed += 0x6d2b79f5);
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function lerp(a, b, t) { return a + (b - a) * t; }
function hexToRgb(h) {
  const n = parseInt(h.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
function mixHex(h1, h2, t) {
  const a = hexToRgb(h1), b = hexToRgb(h2);
  const r = Math.round(lerp(a[0], b[0], t));
  const g = Math.round(lerp(a[1], b[1], t));
  const bl = Math.round(lerp(a[2], b[2], t));
  return `rgb(${r},${g},${bl})`;
}

// Cubic bezier sample — returns point and tangent (unnormalized derivative).
function bezierAt(p0, p1, p2, p3, t) {
  const omt = 1 - t;
  return {
    x: omt * omt * omt * p0.x + 3 * omt * omt * t * p1.x + 3 * omt * t * t * p2.x + t * t * t * p3.x,
    y: omt * omt * omt * p0.y + 3 * omt * omt * t * p1.y + 3 * omt * t * t * p2.y + t * t * t * p3.y,
    tx: 3 * omt * omt * (p1.x - p0.x) + 6 * omt * t * (p2.x - p1.x) + 3 * t * t * (p3.x - p2.x),
    ty: 3 * omt * omt * (p1.y - p0.y) + 6 * omt * t * (p2.y - p1.y) + 3 * t * t * (p3.y - p2.y),
  };
}

// Stroke a cubic bezier as a sequence of short segments whose width tapers
// linearly from baseW (at p0) to tipW (at p3). Relies on round lineCap to
// bridge segment joins smoothly.
function drawTaperedRoot(ctx, p0, p1, p2, p3, baseW, tipW, color, segs = 18) {
  ctx.strokeStyle = color;
  let prevX = p0.x, prevY = p0.y;
  for (let i = 1; i <= segs; i++) {
    const t = i / segs;
    const omt = 1 - t;
    const x = omt * omt * omt * p0.x + 3 * omt * omt * t * p1.x + 3 * omt * t * t * p2.x + t * t * t * p3.x;
    const y = omt * omt * omt * p0.y + 3 * omt * omt * t * p1.y + 3 * omt * t * t * p2.y + t * t * t * p3.y;
    ctx.lineWidth = Math.max(0.25, baseW + (tipW - baseW) * t);
    ctx.beginPath();
    ctx.moveTo(prevX, prevY);
    ctx.lineTo(x, y);
    ctx.stroke();
    prevX = x; prevY = y;
  }
}

// ---------- season (Northern Hemisphere) ----------
function getSeason() {
  const m = new Date().getMonth();
  if (m === 11 || m <= 1) return "winter";
  if (m <= 4) return "spring";
  if (m <= 7) return "summer";
  return "summer";
}

// ---------- project normalization ----------
function normalizeProject(p) {
  const pushed =
    p.pushed == null ? Date.now()
    : typeof p.pushed === "number" ? p.pushed
    : new Date(p.pushed).getTime();
  return {
    name: p.name,
    language: p.language || null,
    stars: p.stars || 0,
    description: p.description || "",
    pushed,
    commits: p.commits || 60,
    url: p.url || "#",
    status: p.status || "mature",
  };
}

// ---------- demo data (fallback when projects.json is missing) ----------
function daysAgo(n) { return Date.now() - n * 86400000; }
const DEMO_REPOS = [
  { name: "starfall-engine", language: "Rust", stars: 42, description: "Tiny 2D game engine with hot-reloading shaders.", pushed: daysAgo(2), commits: 220, url: "#" },
  { name: "pocket-shader", language: "TypeScript", stars: 18, description: "WebGL shader playground that fits in your pocket.", pushed: daysAgo(8), commits: 110, url: "#" },
  { name: "lantern-notes", language: "Svelte", stars: 7, description: "Minimalist markdown notes with glowing links.", pushed: daysAgo(120), commits: 70, url: "#" },
  { name: "tide-forecaster", language: "Python", stars: 24, description: "Surf & tide predictions pulled from NOAA.", pushed: daysAgo(60), commits: 160, url: "#" },
  { name: "opal-cli", language: "Go", stars: 11, description: "Beautiful prompts and widgets for the terminal.", pushed: daysAgo(5), commits: 90, url: "#" },
  { name: "quiet-coast", language: "JavaScript", stars: 55, description: "Ambient audio generator for focused work.", pushed: daysAgo(45), commits: 240, url: "#" },
  { name: "future-weave", language: "Rust", description: "A sapling I'm nurturing — tiny CRDT library for notes.", status: "sapling" },
  { name: "quiet-seed", description: "Something's stirring underground.", status: "seed" },
];

// ---------- Plant ----------
class Plant {
  constructor(repo, x, groundY) {
    this.repo = repo;
    this.x = x;
    this.groundY = groundY;
    this.status = repo.status || "mature";
    const rnd = mulberry32(hashStr(repo.name));

    const daysSince = (Date.now() - (repo.pushed || Date.now())) / 86400000;
    this.vigor = this.status === "mature"
      ? Math.max(0.35, Math.min(1, 1 - daysSince / 365))
      : 1;
    this.recent = this.status === "mature" && daysSince < 30;

    if (this.status === "seed") {
      this.maxHeight = 10 + rnd() * 8;
      this.stemWidth = 1.2;
    } else if (this.status === "sapling") {
      this.maxHeight = 26 + rnd() * 14;
      this.stemWidth = 1.6;
    } else {
      this.maxHeight = 95 + Math.log(repo.commits + 1) * 22;
      this.stemWidth = 2.2 + Math.log(repo.commits + 1) * 0.38;
    }
    this.height = this.status === "seed" ? 1 : 4;

    this.color = LANG_COLORS[repo.language] || "#e78aa8";
    this.flowerInner = mixHex(this.color, "#ffffff", 0.45);
    this.swaySeed = rnd() * Math.PI * 2;
    this.swayAmount = 0.045 + rnd() * 0.08;

    this.leaves = [];
    if (this.status === "seed") {
      this.leaves.push({ pos: 0.88, side: 1, size: 4.5 });
      this.leaves.push({ pos: 0.88, side: -1, size: 4.5 });
    } else if (this.status === "sapling") {
      const leafCount = 1 + Math.floor(rnd() * 2);
      for (let i = 0; i < leafCount; i++) {
        this.leaves.push({
          pos: 0.45 + (i / Math.max(1, leafCount)) * 0.35,
          side: i % 2 === 0 ? 1 : -1,
          size: 4 + rnd() * 3,
        });
      }
    } else {
      const leafCount = 3 + Math.floor(rnd() * 4);
      for (let i = 0; i < leafCount; i++) {
        this.leaves.push({
          pos: 0.18 + (i / leafCount) * 0.6 + (rnd() - 0.5) * 0.08,
          side: i % 2 === 0 ? 1 : -1,
          size: 7 + rnd() * 5,
        });
      }
    }

    this.flower = {
      size: 8 + rnd() * 7,
      petals: 5 + Math.floor(rnd() * 4),
      phase: rnd() * Math.PI * 2,
    };

    this.fireflies = [];
    if (this.status === "mature") {
      const ffCount = Math.min(8, Math.floor(Math.log2((repo.stars || 0) + 2)));
      for (let i = 0; i < ffCount; i++) {
        this.fireflies.push({
          phase: rnd() * Math.PI * 2,
          speed: 0.3 + rnd() * 0.4,
          orbitA: 32 + rnd() * 25,
          orbitB: 18 + rnd() * 18,
          blink: rnd() * Math.PI * 2,
        });
      }
    }

    this.hit = { x, y: groundY, r: 0 };
  }

  grow() {
    if (this.height < this.maxHeight) {
      this.height += (this.maxHeight - this.height) * 0.025;
    }
  }

  getStemPoints(t, wind) {
    const pts = [];
    const baseSway = Math.sin(t * 0.001 + this.swaySeed) * this.swayAmount;
    const gust = wind * 0.18;
    const segments = 10;
    for (let i = 0; i <= segments; i++) {
      const p = i / segments;
      const offset = (baseSway + gust) * Math.pow(p, 1.7) * this.height * 0.35;
      pts.push({ x: this.x + offset, y: this.groundY - this.height * p });
    }
    return pts;
  }

  draw(ctx, t, wind, isHover, isNight, season) {
    const pts = this.getStemPoints(t, wind);
    const tip = pts[pts.length - 1];
    const hitR = this.status === "seed" ? 14
      : this.status === "sapling" ? 18
      : this.flower.size + 14;
    this.hit = { x: tip.x, y: tip.y, r: hitR };

    // Seed: soft soil mound at base
    if (this.status === "seed") {
      ctx.fillStyle = "rgba(50, 35, 25, 0.55)";
      ctx.beginPath();
      ctx.ellipse(this.x, this.groundY, 9, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Stem (brighter green for young plants)
    const stemAlpha = 0.6 + this.vigor * 0.3;
    const young = this.status !== "mature";
    const stemG = young ? 175 : Math.round(110 + this.vigor * 25);
    const stemR = young ? 95 : 60;
    const stemB = young ? 105 : 80;
    ctx.strokeStyle = `rgba(${stemR}, ${stemG}, ${stemB}, ${stemAlpha})`;
    ctx.lineWidth = this.stemWidth;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();

    // Leaves
    for (const leaf of this.leaves) {
      const idx = Math.floor(leaf.pos * (pts.length - 1));
      const p = pts[idx];
      const prev = pts[Math.max(0, idx - 1)];
      const angle = Math.atan2(p.y - prev.y, p.x - prev.x) + Math.PI / 2;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(angle + leaf.side * 0.9 + Math.sin(t * 0.0012 + this.swaySeed) * 0.08);
      let leafR, leafG, leafB, leafA = stemAlpha;
      if (young) {
        leafR = 135; leafG = 205; leafB = 125;
      } else if (season === "autumn") {
        leafR = 170; leafG = 95; leafB = 45;
      } else if (season === "winter") {
        leafR = 110; leafG = 105; leafB = 95;
        leafA = stemAlpha * 0.55;
      } else {
        leafR = 80;
        leafG = Math.round(140 + this.vigor * 30);
        leafB = 90;
      }
      ctx.fillStyle = `rgba(${leafR}, ${leafG}, ${leafB}, ${leafA})`;
      ctx.beginPath();
      if (this.status === "seed") {
        // Round cotyledon-like leaves
        ctx.ellipse(leaf.side * leaf.size * 0.9, 0, leaf.size * 0.9, leaf.size * 0.75, 0, 0, Math.PI * 2);
      } else {
        ctx.ellipse(leaf.side * leaf.size * 0.8, 0, leaf.size, leaf.size * 0.5, 0, 0, Math.PI * 2);
      }
      ctx.fill();
      ctx.restore();
    }

    // Sapling: closed bud instead of flower
    if (this.status === "sapling" && this.height > this.maxHeight * 0.5) {
      const bloomP = Math.min(1, (this.height - this.maxHeight * 0.5) / (this.maxHeight * 0.5));
      const pulse = 0.5 + 0.5 * Math.sin(t * 0.0018 + this.swaySeed);
      const size = 3.8 * bloomP * (isHover ? 1.25 : 1);
      ctx.save();
      ctx.translate(tip.x, tip.y);
      if (isHover || pulse > 0.6) {
        const glowR = size * 4.5;
        const glowA = isHover ? 0.75 : (pulse - 0.6) * 1.6;
        const hex = Math.round(glowA * 170).toString(16).padStart(2, "0");
        const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, glowR);
        grad.addColorStop(0, this.color + hex);
        grad.addColorStop(1, this.color + "00");
        ctx.fillStyle = grad;
        ctx.fillRect(-glowR, -glowR, glowR * 2, glowR * 2);
      }
      ctx.fillStyle = mixHex(this.color, "#2d4a2d", 0.4);
      ctx.beginPath();
      ctx.ellipse(0, -size * 0.5, size * 0.9, size * 1.6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = this.color + "bb";
      ctx.beginPath();
      ctx.ellipse(-size * 0.25, -size * 0.7, size * 0.35, size * 0.9, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Flower (mature only)
    if (this.status === "mature" && this.height > this.maxHeight * 0.3) {
      const bloomP = Math.min(1, (this.height - this.maxHeight * 0.3) / (this.maxHeight * 0.7));
      const seasonScale = season === "spring" ? 1.15 : season === "winter" ? 0.8 : season === "autumn" ? 0.95 : 1;
      const size = this.flower.size * bloomP * (isHover ? 1.18 : 1) * seasonScale;
      ctx.save();
      ctx.translate(tip.x, tip.y);
      ctx.rotate(this.flower.phase + t * 0.00015);

      // Bloom glow
      if (isHover || this.recent) {
        const glowR = size * 3;
        const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, glowR);
        grad.addColorStop(0, this.color + (isHover ? "aa" : "55"));
        grad.addColorStop(1, this.color + "00");
        ctx.fillStyle = grad;
        ctx.fillRect(-glowR, -glowR, glowR * 2, glowR * 2);
      }

      // Petals
      for (let i = 0; i < this.flower.petals; i++) {
        const a = (i / this.flower.petals) * Math.PI * 2;
        ctx.save();
        ctx.rotate(a);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.ellipse(size * 0.7, 0, size * 0.7, size * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // Center
      ctx.fillStyle = this.flowerInner;
      ctx.beginPath();
      ctx.arc(0, 0, size * 0.38, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    // Fireflies (stars)
    for (const f of this.fireflies) {
      const angle = t * 0.001 * f.speed + f.phase;
      const fx = tip.x + Math.cos(angle) * f.orbitA;
      const fy = tip.y + Math.sin(angle) * f.orbitB - 10;
      const blink = 0.5 + 0.5 * Math.sin(t * 0.003 + f.blink);
      const alpha = isNight ? 0.45 + blink * 0.55 : 0.25 + blink * 0.25;
      if (isNight) {
        const g = ctx.createRadialGradient(fx, fy, 0, fx, fy, 14);
        g.addColorStop(0, `rgba(255, 240, 180, ${alpha * 0.55})`);
        g.addColorStop(1, "rgba(255, 240, 180, 0)");
        ctx.fillStyle = g;
        ctx.fillRect(fx - 14, fy - 14, 28, 28);
      }
      ctx.fillStyle = `rgba(255, 240, 180, ${alpha})`;
      ctx.beginPath();
      ctx.arc(fx, fy, 1.8 + blink * 1.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  hitTest(x, y) {
    const dx = x - this.hit.x;
    const dy = y - this.hit.y;
    return dx * dx + dy * dy < this.hit.r * this.hit.r;
  }

  drawRoots(ctx, rootsH, reveal, isNight) {
    this.rootHits = [];
    const contribs = this.contributors;
    if (!contribs || !contribs.length) return;
    const N = Math.min(contribs.length, 12);
    const rng = mulberry32(hashStr(this.repo.name + ":roots"));
    // Anchor at the plant's base; scroll-driven `reveal` handles visibility.
    const startY = this.groundY;
    const spanX = 220;
    const topPadding = 56;
    const available = Math.max(60, rootsH - topPadding - 40);
    const avatarR = 14;
    const clipBottom = startY + reveal * rootsH;

    // Reveal: tendrils grow downward from startY as scroll progresses,
    // and fade in/out together. Clip rect bottom tracks reveal linearly.
    ctx.save();
    ctx.globalAlpha = reveal;
    ctx.beginPath();
    ctx.rect(0, 0, 1e6, clipBottom);
    ctx.clip();

    for (let i = 0; i < N; i++) {
      const c = contribs[i];
      // Deterministic endpoint per index
      const laneT = (i + 0.5 + (rng() - 0.5) * 0.3) / N;
      const tx = this.x + (laneT - 0.5) * spanX + (rng() - 0.5) * 20;
      const depthT = 0.18 + rng() * 0.82;
      const ty = startY + topPadding + depthT * available;

      // Cubic bezier for an organic winding main root.
      const dxEnd = tx - this.x;
      const dyEnd = ty - startY;
      const side = dxEnd >= 0 ? 1 : -1;
      const p0 = { x: this.x, y: startY + 1 };
      const p1 = {
        x: this.x + dxEnd * 0.18 + (rng() - 0.5) * 22,
        y: startY + dyEnd * 0.32,
      };
      const p2 = {
        x: this.x + dxEnd * 0.55 + side * (18 + rng() * 50),
        y: startY + dyEnd * 0.7 + (rng() - 0.5) * 18,
      };
      const p3 = { x: tx, y: ty - avatarR - 1 };

      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      // Dark base stroke (thick → thin) then a lighter highlight threaded on top
      // to suggest a rounded, tapered root body.
      drawTaperedRoot(ctx, p0, p1, p2, p3, 4.4, 0.7, "rgba(42, 26, 14, 0.92)");
      drawTaperedRoot(ctx, p0, p1, p2, p3, 2.2, 0.35, "rgba(122, 78, 42, 0.55)");

      // Fork branches — smaller roots spun off the main root, each tapering further.
      const nForks = 2 + Math.floor(rng() * 2);
      for (let f = 0; f < nForks; f++) {
        const ft = 0.22 + (f + 0.35 + rng() * 0.3) * (0.72 / nForks);
        const b = bezierAt(p0, p1, p2, p3, ft);
        const tlen = Math.hypot(b.tx, b.ty) || 1;
        const perpSign = rng() < 0.5 ? -1 : 1;
        const forkAng = (0.45 + rng() * 0.55) * perpSign;
        const cs = Math.cos(forkAng), sn = Math.sin(forkAng);
        const forkLen = (20 + rng() * 28) * (1 - ft * 0.45);
        const dirX = (b.tx * cs - b.ty * sn) / tlen;
        const dirY = (b.tx * sn + b.ty * cs) / tlen;
        const ex = b.x + dirX * forkLen;
        const ey = b.y + dirY * forkLen + 3;
        const fp0 = { x: b.x, y: b.y };
        const fp1 = { x: b.x + dirX * forkLen * 0.35 + perpSign * 4, y: b.y + dirY * forkLen * 0.35 };
        const fp2 = { x: b.x + dirX * forkLen * 0.7 + perpSign * 7, y: b.y + dirY * forkLen * 0.7 + 2 };
        const fp3 = { x: ex, y: ey };
        const forkBase = Math.max(1.1, 2.0 * (1 - ft * 0.5));
        drawTaperedRoot(ctx, fp0, fp1, fp2, fp3, forkBase, 0.3, "rgba(42, 26, 14, 0.85)", 12);
        drawTaperedRoot(ctx, fp0, fp1, fp2, fp3, Math.max(0.5, forkBase * 0.5), 0.2, "rgba(122, 78, 42, 0.4)", 12);

        // Occasional sub-hair off the fork tip.
        if (rng() < 0.65) {
          const hairAng = forkAng + (rng() - 0.5) * 0.8;
          const hlen = 6 + rng() * 8;
          const hcs = Math.cos(hairAng), hsn = Math.sin(hairAng);
          const hdx = (b.tx * hcs - b.ty * hsn) / tlen;
          const hdy = (b.tx * hsn + b.ty * hcs) / tlen;
          ctx.strokeStyle = "rgba(62, 38, 20, 0.7)";
          ctx.lineWidth = 0.7;
          ctx.beginPath();
          ctx.moveTo(ex, ey);
          ctx.lineTo(ex + hdx * hlen, ey + hdy * hlen + 2);
          ctx.stroke();
        }
      }

      // Tiny surface hairs along the main root for fuzz.
      const nHairs = 3 + Math.floor(rng() * 3);
      for (let h = 0; h < nHairs; h++) {
        const ht = 0.15 + rng() * 0.75;
        const bh = bezierAt(p0, p1, p2, p3, ht);
        const tl = Math.hypot(bh.tx, bh.ty) || 1;
        const ps = rng() < 0.5 ? -1 : 1;
        const px = (-bh.ty / tl) * ps;
        const py = (bh.tx / tl) * ps;
        const hl = 3 + rng() * 5;
        ctx.strokeStyle = "rgba(62, 38, 20, 0.55)";
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(bh.x, bh.y);
        ctx.lineTo(bh.x + px * hl, bh.y + py * hl + 1);
        ctx.stroke();
      }

      // Avatar disc
      const img = c.avatar_url ? getAvatarImage(c.avatar_url) : null;
      ctx.save();
      ctx.beginPath();
      ctx.arc(tx, ty, avatarR, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();
      if (img && img._ready && !img._failed) {
        try { ctx.drawImage(img, tx - avatarR, ty - avatarR, avatarR * 2, avatarR * 2); }
        catch { /* tainted canvas — fall through to placeholder */ }
      } else {
        const hue = hashStr(c.login || c.name || "?") % 360;
        ctx.fillStyle = `hsl(${hue}, 38%, 42%)`;
        ctx.fillRect(tx - avatarR, ty - avatarR, avatarR * 2, avatarR * 2);
        const initial = (c.name || c.login || "?").trim().charAt(0).toUpperCase();
        ctx.fillStyle = "rgba(255,255,255,0.88)";
        ctx.font = "bold 14px -apple-system, Segoe UI, Roboto, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(initial, tx, ty + 0.5);
      }
      ctx.restore();

      // Ring around avatar
      ctx.strokeStyle = isNight ? "rgba(230, 220, 190, 0.7)" : "rgba(240, 235, 215, 0.85)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.arc(tx, ty, avatarR, 0, Math.PI * 2);
      ctx.stroke();

      // Name label
      const rawLabel = c.name || c.login || "?";
      const label = rawLabel.length > 20 ? rawLabel.slice(0, 19) + "\u2026" : rawLabel;
      ctx.fillStyle = isNight ? "rgba(230, 224, 205, 0.85)" : "rgba(245, 240, 222, 0.92)";
      ctx.font = "11px -apple-system, Segoe UI, Roboto, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.fillText(label, tx, ty + avatarR + 4);

      // Register clickable hit region (avatar + label) if the contributor
      // has a resolvable profile URL and the avatar is within the reveal clip.
      if (c.html_url && ty <= clipBottom) {
        const labelW = ctx.measureText(label).width;
        this.rootHits.push({
          cx: tx, cy: ty, r: avatarR,
          lx: tx - labelW / 2 - 2,
          ly: ty + avatarR + 4,
          lw: labelW + 4,
          lh: 14,
          profile: c,
        });
      }
    }

    ctx.restore();
  }

  hitTestRoot(x, y) {
    if (!this.rootHits || !this.rootHits.length) return null;
    for (const h of this.rootHits) {
      const dx = x - h.cx, dy = y - h.cy;
      if (dx * dx + dy * dy <= h.r * h.r) return h.profile;
      if (x >= h.lx && x <= h.lx + h.lw && y >= h.ly && y <= h.ly + h.lh) return h.profile;
    }
    return null;
  }
}

// ---------- Butterfly ----------
class Butterfly {
  constructor(w, h) {
    this.x = Math.random() * w;
    this.y = h * 0.25 + Math.random() * h * 0.4;
    this.vx = (Math.random() - 0.5) * 0.6;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.flap = Math.random() * Math.PI * 2;
    this.color = ["#f4a261", "#e9c46a", "#c77dff", "#ffafcc", "#90dbf4"][
      Math.floor(Math.random() * 5)
    ];
    this.size = 5 + Math.random() * 3;
  }

  update(w, h) {
    this.vx += (Math.random() - 0.5) * 0.08;
    this.vy += (Math.random() - 0.5) * 0.06 - 0.004;
    this.vx = Math.max(-1.4, Math.min(1.4, this.vx * 0.98));
    this.vy = Math.max(-1, Math.min(1, this.vy * 0.98));
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < -30) this.x = w + 30;
    if (this.x > w + 30) this.x = -30;
    if (this.y < h * 0.1) this.vy += 0.1;
    if (this.y > h * 0.72) this.vy -= 0.1;
    this.flap += 0.32;
  }

  draw(ctx) {
    const wing = Math.sin(this.flap) * 0.5 + 0.5;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.fillStyle = this.color + "cc";
    ctx.beginPath();
    ctx.ellipse(-this.size * wing, -this.size * 0.3, this.size, this.size * wing, 0, 0, Math.PI * 2);
    ctx.ellipse(this.size * wing, -this.size * 0.3, this.size, this.size * wing, 0, 0, Math.PI * 2);
    ctx.ellipse(-this.size * wing * 0.8, this.size * 0.3, this.size * 0.7, this.size * wing * 0.7, 0, 0, Math.PI * 2);
    ctx.ellipse(this.size * wing * 0.8, this.size * 0.3, this.size * 0.7, this.size * wing * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "rgba(40, 30, 50, 0.85)";
    ctx.beginPath();
    ctx.ellipse(0, 0, 1.2, this.size * 0.8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ---------- Particle (pollen / petal / leaf / snow) ----------
class Particle {
  constructor(w, h, type) {
    this.type = type;
    this.reset(w, h, true);
  }
  reset(w, h, initial) {
    this.x = Math.random() * w;
    const t = this.type;
    if (t === "pollen") {
      this.y = initial ? Math.random() * h : h + 10;
      this.vx = (Math.random() - 0.5) * 0.3;
      this.vy = -0.1 - Math.random() * 0.25;
      this.size = 1 + Math.random() * 1.5;
      this.alpha = 0.18 + Math.random() * 0.4;
      this.rot = 0; this.rotSpeed = 0;
    } else if (t === "petal") {
      this.y = initial ? Math.random() * h : -20;
      this.vx = (Math.random() - 0.5) * 0.5;
      this.vy = 0.25 + Math.random() * 0.35;
      this.size = 3 + Math.random() * 3;
      this.alpha = 0.55 + Math.random() * 0.3;
      this.rot = Math.random() * Math.PI * 2;
      this.rotSpeed = (Math.random() - 0.5) * 0.05;
      this.hue = 330 + Math.random() * 40;
    } else if (t === "leaf") {
      this.y = initial ? Math.random() * h : -20;
      this.vx = (Math.random() - 0.5) * 0.6;
      this.vy = 0.3 + Math.random() * 0.4;
      this.size = 4 + Math.random() * 4;
      this.alpha = 0.65 + Math.random() * 0.25;
      this.rot = Math.random() * Math.PI * 2;
      this.rotSpeed = (Math.random() - 0.5) * 0.08;
      this.hue = 20 + Math.random() * 30;
    } else { // snow
      this.y = initial ? Math.random() * h : -20;
      this.vx = (Math.random() - 0.5) * 0.2;
      this.vy = 0.2 + Math.random() * 0.35;
      this.size = 1 + Math.random() * 2.2;
      this.alpha = 0.6 + Math.random() * 0.4;
      this.rot = 0; this.rotSpeed = 0;
    }
  }
  update(w, h, wind) {
    const windMul = this.type === "snow" ? 0.35 : this.type === "pollen" ? 0.55 : 0.8;
    this.x += this.vx + wind * windMul;
    this.y += this.vy;
    this.rot += this.rotSpeed;
    const goesUp = this.type === "pollen";
    if ((goesUp && this.y < -20) || (!goesUp && this.y > h + 20)) {
      this.reset(w, h, false);
    }
    if (this.x < -30) this.x = w + 30;
    if (this.x > w + 30) this.x = -30;
  }
  draw(ctx, isNight) {
    const t = this.type;
    if (t === "pollen") {
      ctx.fillStyle = isNight
        ? `rgba(180, 200, 220, ${this.alpha})`
        : `rgba(255, 250, 200, ${this.alpha})`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    } else if (t === "snow") {
      ctx.fillStyle = `rgba(240, 245, 255, ${this.alpha})`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // petal or leaf
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);
      const L = isNight ? (t === "leaf" ? 32 : 72) : (t === "leaf" ? 48 : 82);
      ctx.fillStyle = `hsla(${this.hue}, ${t === "leaf" ? 65 : 75}%, ${L}%, ${this.alpha})`;
      ctx.beginPath();
      ctx.ellipse(0, 0, this.size, this.size * 0.55, 0, 0, Math.PI * 2);
      ctx.fill();
      if (t === "leaf") {
        ctx.strokeStyle = `hsla(${this.hue}, 55%, ${L - 18}%, ${this.alpha})`;
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(-this.size, 0);
        ctx.lineTo(this.size, 0);
        ctx.stroke();
      }
      ctx.restore();
    }
  }
}

// ---------- Garden ----------
class Phoenix {
  constructor(w, h) {
    this.x = -80;
    this.y = h * (0.15 + Math.random() * 0.25);
    this.vx = 5 + Math.random() * 2;
    this.baseY = this.y;
    this.age = 0;
    this.life = 0;
    this.trail = [];
    this.w = w;
  }
  update() {
    this.age++;
    this.x += this.vx;
    this.y = this.baseY + Math.sin(this.age * 0.06) * 28;
    for (let i = 0; i < 3; i++) {
      this.trail.push({
        x: this.x + (Math.random() - 0.5) * 6 - this.vx,
        y: this.y + (Math.random() - 0.5) * 6,
        vx: -this.vx * 0.2 + (Math.random() - 0.5) * 0.8,
        vy: (Math.random() - 0.5) * 0.6 - 0.2,
        life: 0,
        max: 30 + Math.random() * 25,
        hue: 10 + Math.random() * 40,
      });
    }
    for (const p of this.trail) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy -= 0.03;
      p.life++;
    }
    this.trail = this.trail.filter((p) => p.life < p.max);
    this.life++;
  }
  done() { return this.x > this.w + 120; }
  draw(ctx) {
    for (const p of this.trail) {
      const a = 1 - p.life / p.max;
      const r = 2 + (1 - a) * 4;
      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 2);
      grd.addColorStop(0, `hsla(${p.hue}, 100%, 65%, ${a * 0.9})`);
      grd.addColorStop(1, `hsla(${p.hue}, 100%, 50%, 0)`);
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r * 2, 0, Math.PI * 2);
      ctx.fill();
    }
    const bodyGrd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 22);
    bodyGrd.addColorStop(0, "rgba(255, 240, 180, 1)");
    bodyGrd.addColorStop(0.4, "rgba(255, 170, 60, 0.9)");
    bodyGrd.addColorStop(1, "rgba(255, 80, 20, 0)");
    ctx.fillStyle = bodyGrd;
    ctx.beginPath();
    ctx.arc(this.x, this.y, 22, 0, Math.PI * 2);
    ctx.fill();
    // Silhouette wings
    const flap = Math.sin(this.age * 0.35) * 8;
    ctx.strokeStyle = "rgba(255, 200, 100, 0.85)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(this.x - 14, this.y + flap);
    ctx.quadraticCurveTo(this.x - 4, this.y - 4, this.x + 4, this.y);
    ctx.quadraticCurveTo(this.x - 4, this.y - 4, this.x - 14, this.y - flap);
    ctx.stroke();
  }
}

class OwlShadow {
  constructor(w, h) {
    const rtl = Math.random() < 0.5;
    this.vx = rtl ? -2.8 : 2.8;
    this.x = rtl ? w + 60 : -60;
    this.y = h * (0.2 + Math.random() * 0.2);
    this.age = 0;
    this.w = w;
  }
  update() {
    this.age++;
    this.x += this.vx;
    this.y += Math.sin(this.age * 0.05) * 0.6;
  }
  done() { return (this.vx > 0 && this.x > this.w + 80) || (this.vx < 0 && this.x < -80); }
  draw(ctx) {
    const flap = Math.sin(this.age * 0.25);
    ctx.save();
    ctx.translate(this.x, this.y);
    if (this.vx < 0) ctx.scale(-1, 1);
    ctx.fillStyle = "rgba(10, 10, 20, 0.78)";
    ctx.beginPath();
    ctx.ellipse(0, 0, 9, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-2, -1);
    ctx.quadraticCurveTo(-14, -10 - flap * 6, -22, -4 - flap * 3);
    ctx.quadraticCurveTo(-12, -2, -2, 1);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(2, -1);
    ctx.quadraticCurveTo(14, -10 - flap * 6, 22, -4 - flap * 3);
    ctx.quadraticCurveTo(12, -2, 2, 1);
    ctx.fill();
    ctx.restore();
  }
}

class Garden {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext("2d");
    this.plants = [];
    this.butterflies = [];
    this.particles = [];
    this.season = getSeason();
    this.mouse = { x: -9999, y: -9999 };
    this.hoverPlant = null;
    this.wind = 0;
    this.windTarget = 0;
    this.phoenixes = [];
    this.owls = [];
    this.rainDrops = [];
    this.rainUntil = 0;
    this.sunPos = { x: 0, y: 0 };
    this.sunClicks = 0;
    this.sunClickTime = 0;
    this.rootsReveal = 0; // 0 = fully hidden (top of page), 1 = fully revealed

    this.resize();
    window.addEventListener("resize", () => this.resize());
    canvas.addEventListener("mousemove", (e) => {
      const r = canvas.getBoundingClientRect();
      this.mouse.x = e.clientX - r.left;
      this.mouse.y = e.clientY - r.top;
    });
    canvas.addEventListener("mouseleave", () => {
      this.mouse.x = -9999;
      this.mouse.y = -9999;
    });
    canvas.addEventListener("click", (e) => {
      if (this.hoverRoot && this.hoverRoot.html_url) {
        window.open(this.hoverRoot.html_url, "_blank", "noopener,noreferrer");
        return;
      }
      if (this.hoverPlant && this.hoverPlant.repo.url && this.hoverPlant.repo.url !== "#") {
        window.open(this.hoverPlant.repo.url, "_blank");
        return;
      }
      const r = canvas.getBoundingClientRect();
      const mx = e.clientX - r.left;
      const my = e.clientY - r.top;
      const dx = mx - this.sunPos.x;
      const dy = my - this.sunPos.y;
      if (Math.hypot(dx, dy) < 36) {
        const now = Date.now();
        if (now - this.sunClickTime > 2500) this.sunClicks = 0;
        this.sunClicks++;
        this.sunClickTime = now;
        if (this.sunClicks >= 3) {
          this.sunClicks = 0;
          this.summonOwl();
        }
      }
    });
  }

  summonPhoenix() {
    if (this.phoenixes.length >= 2) return;
    this.phoenixes.push(new Phoenix(this.w, this.h));
  }
  summonOwl() {
    if (this.owls.length >= 2) return;
    this.owls.push(new OwlShadow(this.w, this.h));
    if (typeof audio !== "undefined" && audio.enabled) audio._playOwl();
  }
  forceBloom() {
    for (const p of this.plants) {
      p.height = p.maxHeight;
    }
    const type =
      this.season === "autumn" ? "leaf" :
      this.season === "winter" ? "snow" : "petal";
    for (let i = 0; i < 40; i++) {
      const p = new Particle(this.w, this.h, type);
      p.y = this.groundY - Math.random() * (this.h * 0.35);
      p.vy = -0.5 - Math.random() * 0.8;
      this.particles.push(p);
    }
  }
  startRain(ms = 15000) {
    this.rainUntil = Date.now() + ms;
  }

  resize() {
    const dpr = window.devicePixelRatio || 1;
    this.w = window.innerWidth;
    this.h = window.innerHeight;
    this.rootsH = Math.floor(this.h * 0.9);
    this.totalH = this.h + this.rootsH;
    this.canvas.width = this.w * dpr;
    this.canvas.height = this.totalH * dpr;
    this.canvas.style.width = this.w + "px";
    this.canvas.style.height = this.totalH + "px";
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    this.groundY = this.h * 0.82;
    this.layout();
  }

  setProjects(repos) {
    this.repos = repos;
    this.plants = [];
    this.layout();

    const season = this.season;
    const bfCount = Math.min(6, Math.max(2, Math.floor(repos.length / 3)));
    const bfMult =
      season === "winter" ? 0 :
      season === "autumn" ? 0.5 :
      season === "spring" ? 1.4 : 1;
    const butterflyN = Math.round(bfCount * bfMult);
    this.butterflies = Array.from({ length: butterflyN }, () => new Butterfly(this.w, this.h));

    const particleType =
      season === "spring" ? "petal" :
      season === "autumn" ? "leaf" :
      season === "winter" ? "snow" : "pollen";
    const particleN =
      season === "winter" ? 90 :
      season === "autumn" ? 50 :
      season === "spring" ? 45 : 50;
    this.particles = Array.from({ length: particleN }, () => new Particle(this.w, this.h, particleType));
  }

  layout() {
    if (!this.repos) return;
    const margin = 70;
    const avail = this.w - margin * 2;
    const step = avail / Math.max(1, this.repos.length);
    const posFor = (name, i) => {
      const jitter = (mulberry32(hashStr(name + "x"))() - 0.5) * step * 0.3;
      return margin + step * (i + 0.5) + jitter;
    };
    if (this.plants.length === this.repos.length) {
      // Keep existing growth state; just reposition.
      this.plants.forEach((plant, i) => {
        plant.x = posFor(plant.repo.name, i);
        plant.groundY = this.groundY;
      });
    } else {
      this.plants = this.repos.map((r, i) => new Plant(r, posFor(r.name, i), this.groundY));
    }
  }

  getTimeOfDay() {
    const d = new Date();
    const h = d.getHours() + d.getMinutes() / 60;
    if (h < 5) return { phase: "night" };
    if (h < 7) return { phase: "dawn" };
    if (h < 18) return { phase: "day" };
    if (h < 22) return { phase: "dusk" };
    return { phase: "night" };
  }

  drawSky(tod) {
    const ctx = this.ctx;
    const season = this.season;
    let top, bot;
    if (tod.phase === "night") {
      top = "#0a1028";
      bot = season === "winter" ? "#223046" : "#1a2848";
    } else if (tod.phase === "dawn") {
      top = "#2a2550";
      bot = season === "winter" ? "#c8a3b8" : season === "autumn" ? "#f09068" : "#f5a173";
    } else if (tod.phase === "day") {
      if (season === "spring") { top = "#7bc8e3"; bot = "#f5d9e0"; }
      else if (season === "autumn") { top = "#6fa8c8"; bot = "#f0d4a0"; }
      else if (season === "winter") { top = "#9bb5c7"; bot = "#d9dde2"; }
      else { top = "#6ebedd"; bot = "#d7ecf1"; }
    } else {
      if (season === "autumn") { top = "#3a2248"; bot = "#f08c4a"; }
      else if (season === "winter") { top = "#4a4868"; bot = "#e0b498"; }
      else { top = "#3a2658"; bot = "#f08c6a"; }
    }

    const g = ctx.createLinearGradient(0, 0, 0, this.h);
    g.addColorStop(0, top);
    g.addColorStop(1, bot);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, this.w, this.h);

    // Stars
    if (tod.phase !== "day") {
      const starAlpha =
        tod.phase === "night" ? 1 :
        tod.phase === "dawn" ? 0.3 :
        0.5;
      for (let i = 0; i < 110; i++) {
        const seed = mulberry32(i * 7919 + 11);
        const sx = seed() * this.w;
        const sy = seed() * this.h * 0.6;
        const sSize = seed() * 1.4 + 0.3;
        const twinkle = 0.5 + 0.5 * Math.sin(Date.now() * 0.001 + i * 0.7);
        ctx.fillStyle = `rgba(255, 250, 220, ${starAlpha * twinkle * 0.8})`;
        ctx.beginPath();
        ctx.arc(sx, sy, sSize, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Sun or moon
    const cx = this.w * 0.78;
    const cy = this.h * 0.18;
    this.sunPos.x = cx;
    this.sunPos.y = cy;
    if (tod.phase === "day") {
      const g2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, 90);
      g2.addColorStop(0, "rgba(255, 245, 200, 0.7)");
      g2.addColorStop(1, "rgba(255, 245, 200, 0)");
      ctx.fillStyle = g2;
      ctx.fillRect(cx - 90, cy - 90, 180, 180);
      ctx.fillStyle = "#fff5c8";
      ctx.beginPath();
      ctx.arc(cx, cy, 28, 0, Math.PI * 2);
      ctx.fill();
    } else if (tod.phase === "night" || tod.phase === "dusk") {
      ctx.fillStyle = "#f0ecd8";
      ctx.beginPath();
      ctx.arc(cx, cy, 22, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = tod.phase === "night" ? "#0a1028" : "#3a2658";
      ctx.beginPath();
      ctx.arc(cx + 8, cy - 5, 20, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  drawHills(tod) {
    const ctx = this.ctx;
    const isDark = tod.phase === "night" || tod.phase === "dawn";
    const season = this.season;

    let farC, nearC;
    if (isDark) {
      farC = season === "winter" ? "rgba(35, 50, 70, 0.72)" : "rgba(20, 35, 55, 0.7)";
      nearC = season === "winter" ? "rgba(25, 40, 60, 0.92)" : "rgba(15, 25, 45, 0.9)";
    } else if (season === "autumn") {
      farC = "rgba(180, 140, 90, 0.5)";
      nearC = "rgba(145, 100, 60, 0.82)";
    } else if (season === "winter") {
      farC = "rgba(165, 180, 195, 0.55)";
      nearC = "rgba(115, 135, 155, 0.85)";
    } else if (season === "spring") {
      farC = "rgba(140, 190, 150, 0.5)";
      nearC = "rgba(105, 160, 115, 0.82)";
    } else {
      farC = "rgba(130, 170, 150, 0.5)";
      nearC = "rgba(92, 142, 112, 0.82)";
    }

    ctx.fillStyle = farC;
    ctx.beginPath();
    ctx.moveTo(0, this.groundY);
    for (let x = 0; x <= this.w; x += 20) {
      const y = this.groundY - 62 - Math.sin(x * 0.004) * 28 - Math.sin(x * 0.012) * 12;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(this.w, this.groundY);
    ctx.fill();

    ctx.fillStyle = nearC;
    ctx.beginPath();
    ctx.moveTo(0, this.groundY);
    for (let x = 0; x <= this.w; x += 20) {
      const y = this.groundY - 32 - Math.sin(x * 0.008 + 1) * 18 - Math.sin(x * 0.02) * 6;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(this.w, this.groundY);
    ctx.fill();
  }

  drawGround(tod) {
    const ctx = this.ctx;
    const isDark = tod.phase === "night" || tod.phase === "dawn";
    const season = this.season;

    let groundC, grassC, soilC;
    if (isDark) {
      groundC = season === "winter" ? "#2a3540" : season === "autumn" ? "#2a1f15" : "#0f1a15";
      grassC = season === "winter" ? "rgba(130, 150, 170, 0.5)" : "rgba(40, 70, 55, 0.6)";
      soilC = season === "winter" ? "#2a2018" : "#1c140b";
    } else if (season === "autumn") {
      groundC = "#5c4526";
      grassC = "rgba(185, 140, 80, 0.55)";
      soilC = "#5c4526";
    } else if (season === "winter") {
      groundC = "#4a5560";
      grassC = "rgba(200, 210, 220, 0.55)";
      soilC = "#4a3a2a";
    } else if (season === "spring") {
      groundC = "#4a6c3a";
      grassC = "rgba(135, 180, 95, 0.6)";
      soilC = "#6b4a2a";
    } else {
      groundC = "#3a5c3a";
      grassC = "rgba(120, 160, 90, 0.55)";
      soilC = "#5c3f22";
    }
    ctx.fillStyle = groundC;
    ctx.fillRect(0, this.groundY, this.w, this.totalH - this.groundY);
    ctx.fillStyle = soilC;
    ctx.fillRect(0, this.h, this.w, this.totalH - this.h);

    // Soil gets darker the deeper you go (toward the roots zone).
    const deepGrad = ctx.createLinearGradient(0, this.groundY, 0, this.totalH);
    deepGrad.addColorStop(0, "rgba(0, 0, 0, 0)");
    deepGrad.addColorStop(1, "rgba(0, 0, 0, 0.55)");
    ctx.fillStyle = deepGrad;
    ctx.fillRect(0, this.groundY, this.w, this.totalH - this.groundY);

    if (season === "winter") {
      ctx.fillStyle = isDark ? "rgba(200, 215, 230, 0.2)" : "rgba(240, 245, 255, 0.55)";
      ctx.fillRect(0, this.groundY, this.w, (this.h - this.groundY) + 6);
    }

    ctx.strokeStyle = grassC;
    ctx.lineWidth = 1;
    const t = Date.now() * 0.001;
    const blades = season === "winter" ? 80 : 220;
    for (let i = 0; i < blades; i++) {
      const seed = mulberry32(i * 103 + 7);
      const gx = seed() * this.w;
      const gh = (season === "winter" ? 1.5 : 3) + seed() * (season === "winter" ? 3 : 8);
      const sway = Math.sin(t + i) * 1.8;
      ctx.beginPath();
      ctx.moveTo(gx, this.groundY);
      ctx.lineTo(gx + sway, this.groundY - gh);
      ctx.stroke();
    }
  }

  tick() {
    const t = Date.now();
    const tod = this.getTimeOfDay();
    const isNight = tod.phase === "night" || tod.phase === "dawn";
    this._lastTod = tod.phase;

    // Wind gusts
    if (Math.random() < 0.002) this.windTarget = (Math.random() - 0.3) * 1.6;
    this.wind += (this.windTarget - this.wind) * 0.02;
    this.windTarget *= 0.99;

    this.ctx.clearRect(0, 0, this.w, this.totalH);
    this.drawSky(tod);
    this.drawHills(tod);

    // Particles (behind the ground — pollen rises, leaves/petals/snow fall)
    for (const p of this.particles) {
      p.update(this.w, this.h, this.wind);
      p.draw(this.ctx, isNight);
    }

    this.drawGround(tod);

    // Scroll-driven roots reveal: 0 at the very top, 1 when scrolled past ~40% of viewport.
    // Eased so starting to scroll smoothly animates the tendrils downward;
    // returning to the very top fades them out.
    const scrollY = window.scrollY || window.pageYOffset || 0;
    const targetReveal = Math.min(1, scrollY / Math.max(80, this.h * 0.4));
    this.rootsReveal += (targetReveal - this.rootsReveal) * 0.12;
    if (this.rootsReveal < 0.002) this.rootsReveal = 0;

    // Roots beneath the soil — drawn before the plants so flowers/leaves stay on top.
    if (this.rootsReveal > 0.005) {
      for (const plant of this.plants) {
        plant.drawRoots(this.ctx, this.rootsH, this.rootsReveal, isNight);
      }
    }

    // Hover detection (last-drawn wins so tallest/nearest doesn't always hijack)
    this.hoverPlant = null;
    for (const plant of this.plants) {
      if (plant.hitTest(this.mouse.x, this.mouse.y)) this.hoverPlant = plant;
    }

    // Contributor (root) hover — only when roots are sufficiently revealed
    // so we don't register clicks on barely-visible avatars.
    this.hoverRoot = null;
    if (this.rootsReveal > 0.6) {
      for (const plant of this.plants) {
        const hit = plant.hitTestRoot(this.mouse.x, this.mouse.y);
        if (hit) { this.hoverRoot = hit; break; }
      }
    }
    this.canvas.classList.toggle("hover", !!this.hoverPlant || !!this.hoverRoot);

    for (const plant of this.plants) {
      plant.grow();
      plant.draw(this.ctx, t, this.wind, plant === this.hoverPlant, isNight, this.season);
    }

    // Butterflies during daylight, skip in winter
    if (tod.phase !== "night" && this.season !== "winter") {
      for (const b of this.butterflies) {
        b.update(this.w, this.h);
        b.draw(this.ctx);
      }
    }

    // Rain
    if (Date.now() < this.rainUntil) {
      for (let i = 0; i < 6; i++) {
        this.rainDrops.push({
          x: Math.random() * (this.w + 200) - 100,
          y: -10,
          vy: 11 + Math.random() * 4,
          len: 9 + Math.random() * 6,
        });
      }
    }
    this.ctx.strokeStyle = "rgba(170, 200, 225, 0.55)";
    this.ctx.lineWidth = 1;
    for (const d of this.rainDrops) {
      d.x += this.wind * 1.8;
      d.y += d.vy;
      this.ctx.beginPath();
      this.ctx.moveTo(d.x, d.y);
      this.ctx.lineTo(d.x - this.wind * 3, d.y - d.len);
      this.ctx.stroke();
    }
    this.rainDrops = this.rainDrops.filter((d) => d.y < this.groundY + 4);

    // Phoenix + owls
    for (const p of this.phoenixes) { p.update(); p.draw(this.ctx); }
    this.phoenixes = this.phoenixes.filter((p) => !p.done());
    for (const o of this.owls) { o.update(); o.draw(this.ctx); }
    this.owls = this.owls.filter((o) => !o.done());

    // Vignette
    const vg = this.ctx.createRadialGradient(
      this.w / 2, this.h / 2, this.h * 0.32,
      this.w / 2, this.h / 2, this.h * 0.85
    );
    vg.addColorStop(0, "rgba(0,0,0,0)");
    vg.addColorStop(1, "rgba(0,0,0,0.42)");
    this.ctx.fillStyle = vg;
    this.ctx.fillRect(0, 0, this.w, this.h);
  }
}

// ---------- Audio ----------
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.master = null;
    this.wind = null;
    this.windFilter = null;
    this.crickets = null;
    this.enabled = false;
    this.inited = false;
    this._nextBird = 0;
    this._nextOwl = 0;
    this._season = "spring";
    this._tod = "day";
  }

  async _init() {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return false;
    this.ctx = new AC();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0;
    this.master.connect(this.ctx.destination);
    this._setupWind();
    this._setupCrickets();
    this.inited = true;
    return true;
  }

  _setupWind() {
    const c = this.ctx;
    const bufLen = c.sampleRate * 8;
    const buf = c.createBuffer(1, bufLen, c.sampleRate);
    const d = buf.getChannelData(0);
    let last = 0;
    for (let i = 0; i < bufLen; i++) {
      const w = (Math.random() * 2 - 1) * 0.5;
      last = (last + 0.02 * w) / 1.02;
      d[i] = last * 3.0;
    }
    const src = c.createBufferSource();
    src.buffer = buf;
    src.loop = true;
    const filt = c.createBiquadFilter();
    filt.type = "lowpass";
    filt.frequency.value = 500;
    filt.Q.value = 0.6;
    const g = c.createGain();
    g.gain.value = 0.18;
    src.connect(filt).connect(g).connect(this.master);
    src.start();
    this.wind = g;
    this.windFilter = filt;
  }

  _setupCrickets() {
    const c = this.ctx;
    const g = c.createGain();
    g.gain.value = 0;
    g.connect(this.master);
    const freqs = [4600, 4950, 5300, 5700];
    for (const f of freqs) {
      const osc = c.createOscillator();
      osc.type = "triangle";
      osc.frequency.value = f + (Math.random() - 0.5) * 40;
      const lfo = c.createOscillator();
      lfo.type = "square";
      lfo.frequency.value = 7 + Math.random() * 3;
      const lfoGain = c.createGain();
      lfoGain.gain.value = 0.5;
      const amp = c.createGain();
      amp.gain.value = 0;
      lfo.connect(lfoGain).connect(amp.gain);
      osc.connect(amp).connect(g);
      osc.start();
      lfo.start();
    }
    this.crickets = g;
  }

  _playBirdPhrase() {
    if (!this.ctx || !this.enabled) return;
    const c = this.ctx;
    const now = c.currentTime;
    const count = 2 + Math.floor(Math.random() * 3);
    const base = 1800 + Math.random() * 1400;
    for (let i = 0; i < count; i++) {
      const t0 = now + i * (0.12 + Math.random() * 0.08);
      const osc = c.createOscillator();
      osc.type = "sine";
      const startF = base + (Math.random() - 0.5) * 400;
      const endF = startF * (0.55 + Math.random() * 0.25);
      osc.frequency.setValueAtTime(startF, t0);
      osc.frequency.exponentialRampToValueAtTime(endF, t0 + 0.09);
      const g = c.createGain();
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(0.09, t0 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.1);
      osc.connect(g).connect(this.master);
      osc.start(t0);
      osc.stop(t0 + 0.12);
    }
  }

  _playOwl() {
    if (!this.ctx || !this.enabled) return;
    const c = this.ctx;
    const now = c.currentTime;
    for (let i = 0; i < 2; i++) {
      const t0 = now + i * 0.45;
      const osc = c.createOscillator();
      osc.type = "sine";
      osc.frequency.setValueAtTime(260, t0);
      osc.frequency.exponentialRampToValueAtTime(220, t0 + 0.35);
      const g = c.createGain();
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(0.08, t0 + 0.06);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.4);
      osc.connect(g).connect(this.master);
      osc.start(t0);
      osc.stop(t0 + 0.45);
    }
  }

  setWind(strength) {
    if (!this.inited || !this.windFilter) return;
    const s = Math.min(1, Math.abs(strength) / 1.5);
    const now = this.ctx.currentTime;
    this.windFilter.frequency.linearRampToValueAtTime(260 + s * 620, now + 0.3);
    this.wind.gain.linearRampToValueAtTime(0.12 + s * 0.26, now + 0.3);
  }

  setContext(tod, season) {
    this._tod = tod;
    this._season = season;
    if (!this.inited || !this.crickets) return;
    const night = tod === "night" || tod === "dawn";
    const target = night ? (season === "summer" ? 0.06 : 0.035) : 0.0;
    const now = this.ctx.currentTime;
    this.crickets.gain.linearRampToValueAtTime(target, now + 1.5);
  }

  tick() {
    if (!this.inited || !this.enabled) return;
    const now = performance.now();
    const day = this._tod === "day" || this._tod === "dusk";
    const night = this._tod === "night" || this._tod === "dawn";

    if (day && this._season !== "winter" && now >= this._nextBird) {
      this._playBirdPhrase();
      const base = this._season === "spring" ? 2200 : 4500;
      this._nextBird = now + base + Math.random() * 5000;
    }
    if (night && now >= this._nextOwl) {
      if (Math.random() < 0.4) this._playOwl();
      this._nextOwl = now + 12000 + Math.random() * 18000;
    }
  }

  async toggle() {
    if (!this.inited) {
      const ok = await this._init();
      if (!ok) return false;
    }
    if (this.ctx.state === "suspended") await this.ctx.resume();
    this.enabled = !this.enabled;
    const now = this.ctx.currentTime;
    this.master.gain.cancelScheduledValues(now);
    this.master.gain.linearRampToValueAtTime(this.enabled ? 0.7 : 0, now + 0.4);
    return this.enabled;
  }
}

// ---------- GitHub fetch ----------
function parseGithubUrl(url) {
  if (!url || typeof url !== "string") return null;
  const m = url.match(/github\.com\/([^\/\s?#]+)\/([^\/\s?#]+)/i);
  if (!m) return null;
  return { owner: m[1], repo: m[2].replace(/\.git$/i, "") };
}

async function fetchRepoMeta(url) {
  const parsed = parseGithubUrl(url);
  if (!parsed) return null;
  const { owner, repo } = parsed;
  const cacheKey = `garden:gh:${owner}/${repo}`;
  try {
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      const { data, t } = JSON.parse(cached);
      if (Date.now() - t < 3600000) return data; // 1h TTL
    }
  } catch {}
  const r = await fetch(`https://api.github.com/repos/${owner}/${repo}`);
  if (!r.ok) return null;
  const x = await r.json();
  const data = {
    name: x.name,
    language: x.language,
    stars: x.stargazers_count || 0,
    description: x.description || "",
    pushed: new Date(x.pushed_at).getTime(),
    commits: Math.max(10, Math.min(400, Math.floor((x.size || 50) / 8))),
    url: x.html_url,
  };
  try { localStorage.setItem(cacheKey, JSON.stringify({ data, t: Date.now() })); } catch {}
  return data;
}

async function fetchRepos(username) {
  const r = await fetch(
    `https://api.github.com/users/${encodeURIComponent(username)}/repos?per_page=30&sort=pushed`
  );
  if (!r.ok) {
    if (r.status === 403) throw new Error("rate-limited (try again in an hour)");
    if (r.status === 404) throw new Error("user not found");
    throw new Error("HTTP " + r.status);
  }
  const data = await r.json();
  return data
    .filter((x) => !x.fork)
    .slice(0, 16)
    .map((x) => ({
      name: x.name,
      language: x.language,
      stars: x.stargazers_count || 0,
      description: x.description || "(no description)",
      pushed: new Date(x.pushed_at).getTime(),
      commits: Math.max(10, Math.min(400, Math.floor((x.size || 50) / 8))),
      url: x.html_url,
      status: "mature",
    }));
}

// ---------- Contributor ("roots") fetch layer ----------
// One network call per unique GitHub login across the whole garden.
const userCache = new Map();
async function fetchUserProfile(login) {
  if (!login) return null;
  if (userCache.has(login)) return userCache.get(login);
  const k = `garden:gh:user:${login}`;
  try {
    const raw = localStorage.getItem(k);
    if (raw) {
      const c = JSON.parse(raw);
      if (Date.now() - c.t < 86400000) { // 24h
        userCache.set(login, c.data);
        return c.data;
      }
    }
  } catch {}
  try {
    const r = await fetch(`https://api.github.com/users/${encodeURIComponent(login)}`);
    if (!r.ok) { userCache.set(login, null); return null; }
    const x = await r.json();
    const data = {
      login,
      name: x.name || login,
      avatar_url: x.avatar_url,
      html_url: x.html_url || `https://github.com/${login}`,
    };
    try { localStorage.setItem(k, JSON.stringify({ data, t: Date.now() })); } catch {}
    userCache.set(login, data);
    return data;
  } catch {
    userCache.set(login, null);
    return null;
  }
}

async function ghCached(cacheKey, url, ttl) {
  try {
    const raw = localStorage.getItem(cacheKey);
    if (raw) {
      const c = JSON.parse(raw);
      if (Date.now() - c.t < ttl) return c.data;
    }
  } catch {}
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    const data = await r.json();
    try { localStorage.setItem(cacheKey, JSON.stringify({ data, t: Date.now() })); } catch {}
    return data;
  } catch {
    return null;
  }
}

async function fetchContributorsApi(owner, repo) {
  const data = await ghCached(
    `garden:gh:contrib:${owner}/${repo}`,
    `https://api.github.com/repos/${owner}/${repo}/contributors?per_page=30`,
    3600000
  );
  if (!Array.isArray(data)) return [];
  return data
    .filter((u) => u && u.login)
    .map((u) => ({ login: u.login, name: u.login }));
}

async function fetchCommitCoAuthors(owner, repo) {
  const key = `garden:gh:coauth:${owner}/${repo}`;
  // We store the parsed list directly (not raw commits) to keep LS small.
  try {
    const raw = localStorage.getItem(key);
    if (raw) {
      const c = JSON.parse(raw);
      if (Date.now() - c.t < 3600000) return c.data;
    }
  } catch {}
  let commits;
  try {
    const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/commits?per_page=100`);
    if (!r.ok) return [];
    commits = await r.json();
  } catch { return []; }
  if (!Array.isArray(commits)) return [];
  const re = /Co-Authored-By:\s*([^<]+?)\s*<([^>]+)>/gi;
  const noreply = /^\d+\+([^@]+)@users\.noreply\.github\.com$/i;
  const byKey = new Map();
  for (const c of commits) {
    const msg = (c && c.commit && c.commit.message) || "";
    let m;
    while ((m = re.exec(msg)) !== null) {
      const name = m[1].trim();
      const email = m[2].trim().toLowerCase();
      const nrMatch = email.match(noreply);
      const login = nrMatch ? nrMatch[1] : null;
      const k = login ? `login:${login}` : `email:${email}`;
      if (!byKey.has(k)) byKey.set(k, { login, email, name });
    }
  }
  const list = Array.from(byKey.values());
  try { localStorage.setItem(key, JSON.stringify({ data: list, t: Date.now() })); } catch {}
  return list;
}

async function fetchIssueParticipants(owner, repo) {
  const data = await ghCached(
    `garden:gh:issues:${owner}/${repo}`,
    `https://api.github.com/repos/${owner}/${repo}/issues?state=all&per_page=30`,
    3600000
  );
  if (!Array.isArray(data)) return [];
  const seen = new Set();
  const out = [];
  for (const it of data) {
    const login = it && it.user && it.user.login;
    if (login && !seen.has(login)) { seen.add(login); out.push({ login, name: login }); }
  }
  return out;
}

async function aggregateContributors(plant) {
  const parsed = parseGithubUrl(plant.repo && plant.repo.url);
  if (!parsed) return [];
  const { owner, repo } = parsed;
  const [contribs, coauthors, issues] = await Promise.all([
    fetchContributorsApi(owner, repo),
    fetchCommitCoAuthors(owner, repo),
    fetchIssueParticipants(owner, repo),
  ]);
  const byKey = new Map();
  const add = (c) => {
    if (!c) return;
    const k = c.login ? `login:${c.login.toLowerCase()}` : c.email ? `email:${c.email.toLowerCase()}` : null;
    if (!k) return;
    if (!byKey.has(k)) byKey.set(k, { login: c.login || null, email: c.email || null, name: c.name || c.login });
  };
  contribs.forEach(add);
  coauthors.forEach(add);
  issues.forEach(add);
  return Array.from(byKey.values());
}

async function hydrateContributors(plant) {
  try {
    const raw = await aggregateContributors(plant);
    if (!raw.length) return;
    const resolved = await Promise.all(
      raw.map(async (c) => {
        if (c.login) {
          const profile = await fetchUserProfile(c.login);
          if (profile) return profile;
          return { login: c.login, name: c.name || c.login, avatar_url: null, html_url: `https://github.com/${c.login}` };
        }
        return { login: null, name: c.name || c.email, email: c.email, avatar_url: null, html_url: null };
      })
    );
    plant.contributors = resolved.filter(Boolean);
  } catch {
    // Silent: no tendrils is an acceptable fallback (rate limit, offline, etc.)
  }
}

// Canvas avatar cache — in-memory HTMLImageElement per URL.
const avatarImgs = new Map();
function getAvatarImage(url) {
  if (!url) return null;
  const existing = avatarImgs.get(url);
  if (existing) return existing;
  const img = new Image();
  img._ready = false;
  img._failed = false;
  img.crossOrigin = "anonymous";
  img.onload = () => { img._ready = true; };
  img.onerror = () => { img._failed = true; };
  img.src = url;
  avatarImgs.set(url, img);
  return img;
}

// ---------- App init ----------
const garden = new Garden(document.getElementById("garden"));
const audio = new AudioEngine();

(function loop() {
  garden.tick();
  audio.setWind(garden.wind);
  audio.setContext(garden._lastTod || "day", garden.season);
  audio.tick();
  requestAnimationFrame(loop);
})();

// Info card
const info = document.getElementById("info");
const iName = document.getElementById("i-name");
const iLang = document.getElementById("i-lang");
const iDot = document.getElementById("i-dot");
const iDesc = document.getElementById("i-desc");
const iStats = document.getElementById("i-stats");
const iLink = document.getElementById("i-link");

function positionCard(plant) {
  const tip = plant.hit;
  const cardW = info.offsetWidth || 300;
  const cardH = info.offsetHeight || 180;
  const gap = 32;
  let left = tip.x + gap;
  if (left + cardW > window.innerWidth - 16) left = tip.x - gap - cardW;
  left = Math.max(16, Math.min(window.innerWidth - cardW - 16, left));
  let top = tip.y - cardH / 2;
  top = Math.max(16, Math.min(window.innerHeight - cardH - 16, top));
  info.style.left = left + "px";
  info.style.top = top + "px";
}

let lastHover = null;
setInterval(() => {
  if (garden.hoverPlant !== lastHover) {
    lastHover = garden.hoverPlant;
    if (garden.hoverPlant) {
      const r = garden.hoverPlant.repo;
      const status = r.status || "mature";
      iName.textContent = r.name;
      if (status === "sapling") {
        iLang.textContent = r.language ? `planned · ${r.language}` : "planned";
        iDot.style.background = "#7dc36b";
      } else if (status === "seed") {
        iLang.textContent = "seeded";
        iDot.style.background = "#8b6f4e";
      } else {
        iLang.textContent = r.language || "—";
        iDot.style.background = LANG_COLORS[r.language] || "#e78aa8";
      }
      iDesc.textContent = r.description;
      if (status === "mature") {
        const days = Math.max(0, Math.round((Date.now() - r.pushed) / 86400000));
        iStats.innerHTML = `<span>⭐ ${r.stars}</span><span>↻ ${days}d ago</span>`;
      } else if (status === "sapling") {
        iStats.innerHTML = `<span>🌱 growing idea</span>`;
      } else {
        iStats.innerHTML = `<span>🌰 planted seed</span>`;
      }
      if (r.url && r.url !== "#") {
        iLink.href = r.url;
        iLink.style.display = "inline-block";
      } else {
        iLink.style.display = "none";
      }
      positionCard(garden.hoverPlant);
      info.classList.add("show");
    } else {
      info.classList.remove("show");
    }
  }
}, 80);

// Grow from GitHub
const statusEl = document.getElementById("status");
const usernameInput = document.getElementById("username");
const growBtn = document.getElementById("grow");

async function grow() {
  const u = usernameInput.value.trim();
  if (!u) return;
  statusEl.textContent = "fetching...";
  try {
    const repos = await fetchRepos(u);
    if (!repos.length) {
      statusEl.textContent = "no repos found";
      return;
    }
    garden.setProjects(repos.map(normalizeProject));
    statusEl.textContent = `${repos.length} plants growing`;
    garden.plants.forEach((p) => { hydrateContributors(p); });
  } catch (e) {
    statusEl.textContent = "error: " + e.message;
  }
}
growBtn.addEventListener("click", grow);
usernameInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") grow();
});

// Sound toggle
const soundBtn = document.getElementById("sound");
soundBtn.addEventListener("click", async () => {
  const on = await audio.toggle();
  if (on === false && !audio.inited) {
    soundBtn.title = "audio unsupported";
    return;
  }
  soundBtn.textContent = on ? "🔊" : "🔇";
  soundBtn.title = on ? "Mute ambient sound" : "Enable ambient sound";
  soundBtn.classList.toggle("active", on);
});

// ---------- Default load: projects.json → demo fallback ----------
// Mature entries with a GitHub URL get their metadata auto-fetched
// (language, stars, description, pushed, name). Any field you set
// in projects.json wins over the API value.
async function loadDefault() {
  try {
    const r = await fetch("projects.json", { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    const raw = data.projects || [];
    if (!raw.length) throw new Error("no projects listed");

    statusEl.textContent = "reading repos...";
    let hydrated = 0, failed = 0;
    const projects = await Promise.all(raw.map(async (p) => {
      const status = p.status || "mature";
      if (status === "mature" && parseGithubUrl(p.url)) {
        try {
          const meta = await fetchRepoMeta(p.url);
          if (meta) { hydrated++; return normalizeProject({ ...meta, ...p }); }
          failed++;
        } catch { failed++; }
      }
      return normalizeProject(p);
    }));

    garden.setProjects(projects);
    if (data.github && !usernameInput.value) usernameInput.value = data.github;
    garden.plants.forEach((p) => { hydrateContributors(p); });
    const parts = [`${projects.length} plants`];
    if (hydrated) parts.push(`${hydrated} live`);
    if (failed) parts.push(`${failed} offline`);
    statusEl.textContent = parts.join(" · ");
  } catch (e) {
    console.warn("projects.json not loaded:", e.message);
    garden.setProjects(DEMO_REPOS.map(normalizeProject));
    statusEl.textContent = "demo garden (add projects.json)";
  }
}
loadDefault();

// ---------- Hidden creatures / commands ----------
(function setupSecrets() {
  const KONAMI = [
    "ArrowUp","ArrowUp","ArrowDown","ArrowDown",
    "ArrowLeft","ArrowRight","ArrowLeft","ArrowRight",
    "b","a"
  ];
  let konami = [];
  let typed = "";
  let typedTimer = 0;

  function flashHint(text) {
    let el = document.getElementById("hint");
    if (!el) {
      el = document.createElement("div");
      el.id = "hint";
      el.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(10,20,35,0.78);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);color:#e8e4d8;padding:8px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);font-size:13px;letter-spacing:0.3px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:20;";
      document.body.appendChild(el);
    }
    el.textContent = text;
    el.style.opacity = "1";
    clearTimeout(el._t);
    el._t = setTimeout(() => (el.style.opacity = "0"), 1800);
  }

  window.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;

    // Konami
    const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
    konami.push(key);
    if (konami.length > KONAMI.length) konami.shift();
    if (konami.length === KONAMI.length && konami.every((k, i) => k === KONAMI[i])) {
      garden.summonPhoenix();
      flashHint("🔥 phoenix rises");
      konami = [];
    }

    // Typed words
    if (/^[a-z]$/.test(key)) {
      clearTimeout(typedTimer);
      typed = (typed + key).slice(-8);
      typedTimer = setTimeout(() => (typed = ""), 1500);
      if (typed.endsWith("bloom")) {
        garden.forceBloom();
        flashHint("🌸 everything blooms");
        typed = "";
      } else if (typed.endsWith("rain")) {
        garden.startRain(15000);
        flashHint("🌧 rain begins");
        typed = "";
      } else if (typed.endsWith("owl")) {
        garden.summonOwl();
        flashHint("🦉 an owl glides past");
        typed = "";
      }
    }
  });
})();
